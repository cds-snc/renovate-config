name: Validate Renovate config

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-config:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - default.json
          - no-grouping.json

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24

      - name: Validate ${{ matrix.config }} config
        env:
          LOG_LEVEL: debug
        run: |
          npx --yes --package "renovate@latest" -c "renovate-config-validator --strict ${{ matrix.config }}"
